<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebedi Bağlantı Kuruldu ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0213;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle, #250b3a 0%, #0d0213 100%);
            position: relative;
        }
        /* Matrix Arka Plan */
        #matrix-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15;
        }
        /* Tam Merkezleme Sağlayan Konteyner */
        .container {
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 12px; 
            width: 100%; 
            max-width: 390px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* Geri Sayım */
        #countdown {
            font-size: 80px; font-weight: bold; color: #ff3385; text-shadow: 0 0 20px #ff3385; animation: pulse 1s infinite;
        }
        /* Başlatma Butonu */
        #start-btn {
            background: linear-gradient(45deg, #ff3385, #ae20dd); color: white; border: none; padding: 16px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px rgba(255, 51, 133, 0.5); transition: all 0.3s;
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #ff3385; }

        /* --- DİJİTAL MEKTUP ALANI --- */
        #envelope-area {
            display: none; background: rgba(15, 5, 25, 0.8); border-radius: 20px; padding: 35px 20px; box-shadow: 0 0 30px rgba(255, 51, 133, 0.2); border: 2px dashed #ff3385; cursor: pointer; transition: all 0.5s ease; animation: pulse 2s infinite; width: 100%;
        }
        #envelope-area:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(255, 51, 133, 0.5); }
        .envelope-icon { font-size: 70px; margin-bottom: 15px; display: inline-block; filter: drop-shadow(0 0 10px #ff3385); }
        .envelope-hint { font-size: 16px; font-weight: bold; letter-spacing: 1px; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.6); font-family: monospace; }

        /* --- TAM EKRAN UYUMLU SİBER KART --- */
        .card {
            display: none; background: rgba(15, 5, 25, 0.85); border-radius: 20px; padding: 15px; box-shadow: 0 0 30px rgba(255, 51, 133, 0.3); backdrop-filter: blur(12px); border: 2px solid #ff3385; transform: scale(0.95); opacity: 0; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); width: 100%;
        }
        .card.active { display: block; transform: scale(1); opacity: 1; }
        
        h1 { font-size: 18px; color: #ff3385; margin-bottom: 12px; text-shadow: 0 0 15px rgba(255, 51, 133, 0.6); letter-spacing: 2px; font-family: monospace; }

        /* Yüzleri Kırpmayan Akıllı Fotoğraf Alanı */
        .photo-frame {
            width: 100%; 
            height: 240px; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 51, 133, 0.4); 
            box-shadow: 0 0 15px rgba(255, 51, 133, 0.2); 
            margin-bottom: 12px; 
            background: #000;
        }
        /* Dikey fotoğrafta yüzleri ortalamak için pozisyon ayarlandı */
        .photo-frame img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 20%; 
        }

        /* CANLI AŞK SAYAÇ ALANI */
        .love-counter {
            background: rgba(255, 51, 133, 0.1); border: 1px solid rgba(255, 51, 133, 0.3); border-radius: 10px; padding: 8px; font-family: monospace; font-size: 12px; color: #ff3385; text-shadow: 0 0 5px rgba(255, 51, 133, 0.5); margin-bottom: 12px; font-weight: bold; line-height: 1.4;
        }

        /* Canlı Akışlı ve Sabit Yükseklikli Yazı Kutusu */
        .message-box {
            font-size: 13px; line-height: 1.5; color: #e5daf0; background: rgba(0, 0, 0, 0.6); padding: 12px; border-radius: 12px; border-left: 3px solid #ff3385; text-align: left; height: 130px; overflow-y: auto; font-family: monospace; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); margin-bottom: 12px;
        }
        .message-box::-webkit-scrollbar { width: 4px; }
        .message-box::-webkit-scrollbar-thumb { background: #ff3385; border-radius: 10px; }

        /* Rezervasyon Durumu */
        .status-box {
            font-family: monospace; font-size: 11px; color: #ae20dd; text-shadow: 0 0 8px #ae20dd; font-weight: bold; letter-spacing: 1px; border-top: 1px dashed rgba(174, 32, 221, 0.4); padding-top: 10px;
        }

        /* Dokunmatik Kalp Efekti */
        .click-heart {
            position: absolute; pointer-events: none; color: #ff3385; animation: floatHeart 0.8s ease-out forwards; font-size: 24px; z-index: 9999; text-shadow: 0 0 8px #ff3385;
        }
        @keyframes floatHeart {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body onclick="spawnHeart(event)">

    <canvas id="matrix-bg"></canvas>

    <audio id="bg-music" loop>
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button id="start-btn" onclick="startSurprise()">Sürprizi Başlat ❤️</button>

        <div id="countdown" style="display: none;">3</div>

        <div id="envelope-area" onclick="openLetter()">
            <div class="envelope-icon">✉️</div>
            <div class="envelope-hint">Sistemde Yeni Bir Mesaj Var 💌<br><span style="font-size:12px; color:#ff3385;">(Açmak İçin Dokun)</span></div>
        </div>

        <div id="birthday-card" class="card">
            <h1>EBEDİ BAĞLANTI KURULDU</h1>
            
            <div class="photo-frame">
                <img src="fotograf1.jpg" alt="Sevgilim">
            </div>

            <div class="love-counter" id="live-counter">Bağlantı Süresi Hesaplanıyor...</div>

            <div class="message-box" id="typewriter-text"></div>

            <div class="status-box">
                DURUM: SONSUZA KADAR REZERVE EDİLDİ ♾️
            </div>
        </div>
    </div>

    <script>
        const sevgiliOlunanTarih = new Date("2026-04-07T00:00:00");

        const loveLetter = "İyiki doğdun aşkımsu... ❤️ Yanımda olduğun her an, bu uçsuz bucaksız evrendeki en gerçek ve en güzel duygu benim için. Hayatıma kattığın tüm renkler ve sevgin için teşekkür ederim. İyi ki doğdun, iyi ki benim dünyama sızdın sevgilim. Yeni yaşın bize hep musmutlu anlar getirsin! Seni çok seviyorum...";

        const music = document.getElementById('bg-music');
        const countdownEl = document.getElementById('countdown');
        const envelopeArea = document.getElementById('envelope-area');
        const cardEl = document.getElementById('birthday-card');

        function startSurprise() {
            document.getElementById('start-btn').style.display = 'none';
            countdownEl.style.display = 'block';
            music.play().catch(e => console.log("Müzik çalındı."));
            
            let count = 3;
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.remove();
                    envelopeArea.style.display = 'block';
                }
            }, 1000);
        }

        function openLetter() {
            envelopeArea.style.display = 'none';
            cardEl.classList.add('active');
            typeWriter(loveLetter, 0); 
            
            updateLoveCounter();
            setInterval(updateLoveCounter, 1000);
        }

        // Akıllı Yazı Yazma Fonksiyonu - Otomatik Aşağı Kaydırır
        function typeWriter(text, i) {
            if (i < text.length) {
                const box = document.getElementById("typewriter-text");
                box.innerHTML += text.charAt(i);
                
                // Her harf eklendiğinde kutuyu otomatik olarak en alta odaklar
                box.scrollTop = box.scrollHeight;
                
                setTimeout(() => typeWriter(text, i + 1), 45); 
            }
        }

        function updateLoveCounter() {
            const simdi = new Date();
            const fark = simdi - sevgiliOlunanTarih;

            const saniye = Math.floor((fark / 1000) % 60);
            const dakika = Math.floor((fark / 1000 / 60) % 60);
            const saat = Math.floor((fark / (1000 * 60 * 60)) % 24);
            const guntoplam = Math.floor(fark / (1000 * 60 * 60 * 24));
            
            const yil = Math.floor(guntoplam / 365);
            const kalanGun = guntoplam % 365;

            document.getElementById("live-counter").innerHTML = 
                `💝 Birlikteliğimiz: ${yil} Yıl, ${kalanGun} Gün, ${saat} Saat, ${dakika} Dakika, ${saniye} Saniye`;
        }

        function spawnHeart(e) {
            const heart = document.createElement("div");
            heart.className = "click-heart";
            heart.innerHTML = "❤️";
            heart.style.left = e.clientX + "px";
            heart.style.top = e.clientY + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = '0123456789❤️❤️🎉✨'.split('');
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(13, 2, 19, 0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff3385'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
