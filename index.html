<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebedi Bağlantı Kuruldu ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0213;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle, #250b3a 0%, #0d0213 100%);
            position: relative;
        }
        /* Matrix Arka Plan */
        #matrix-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15;
        }
        /* Havai Fişek Canvas */
        #fw-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; display: none;
        }
        /* Tam Merkezleme Sağlayan Konteyner */
        .container {
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 12px; 
            width: 100%; 
            max-width: 390px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* Geri Sayım */
        #countdown {
            font-size: 80px; font-weight: bold; color: #ff3385; text-shadow: 0 0 20px #ff3385; animation: pulse 1s infinite;
        }
        /* Başlatma Butonu */
        #start-btn {
            background: linear-gradient(45deg, #ff3385, #ae20dd); color: white; border: none; padding: 16px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px rgba(255, 51, 133, 0.5); transition: all 0.3s;
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #ff3385; }

        /* --- DİJİTAL MEKTUP ALANI --- */
        #envelope-area {
            display: none; background: rgba(15, 5, 25, 0.8); border-radius: 20px; padding: 35px 20px; box-shadow: 0 0 30px rgba(255, 51, 133, 0.2); border: 2px dashed #ff3385; cursor: pointer; transition: all 0.5s ease; animation: pulse 2s infinite; width: 100%;
        }
        #envelope-area:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(255, 51, 133, 0.5); }
        .envelope-icon { font-size: 70px; margin-bottom: 15px; display: inline-block; filter: drop-shadow(0 0 10px #ff3385); }
        .envelope-hint { font-size: 16px; font-weight: bold; letter-spacing: 1px; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.6); font-family: monospace; }

        /* --- SİBER ŞİFRE PANELİ --- */
        #password-panel {
            display: none; background: rgba(15, 5, 25, 0.9); border-radius: 20px; padding: 25px 20px; border: 2px solid #ff3385; box-shadow: 0 0 25px rgba(255, 51, 133, 0.4); width: 100%; font-family: monospace;
        }
        .panel-title { font-size: 14px; color: #ff3385; margin-bottom: 15px; letter-spacing: 1px; text-shadow: 0 0 10px #ff3385; }
        .panel-hint { font-size: 11px; color: #ae20dd; margin-bottom: 20px; line-height: 1.4; text-shadow: 0 0 5px rgba(174,32,221,0.5); }
        .pass-input { background: #000; border: 1px solid #ff3385; padding: 12px; width: 80%; text-align: center; color: #fff; font-size: 20px; letter-spacing: 4px; border-radius: 8px; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(255,51,133,0.3); outline: none; }
        .pass-btn { background: #ff3385; color: #fff; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #ff3385; }
        #error-msg { font-size: 12px; color: #ff3333; margin-top: 10px; min-height: 18px; font-weight: bold; }

        /* --- TAM EKRAN UYUMLU SİBER KART --- */
        .card {
            display: none; background: rgba(15, 5, 25, 0.85); border-radius: 20px; padding: 15px; box-shadow: 0 0 30px rgba(255, 51, 133, 0.3); backdrop-filter: blur(12px); border: 2px solid #ff3385; transform: scale(0.95); opacity: 0; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); width: 100%;
        }
        .card.active { display: block; transform: scale(1); opacity: 1; }
        
        h1 { font-size: 18px; color: #ff3385; margin-bottom: 12px; text-shadow: 0 0 15px rgba(255, 51, 133, 0.6); letter-spacing: 2px; font-family: monospace; }

        /* İnteraktif Fotoğraf Alanı */
        .photo-frame {
            width: 100%; 
            height: 240px; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 51, 133, 0.4); 
            box-shadow: 0 0 15px rgba(255, 51, 133, 0.2); 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            margin-bottom: 5px;
        }
        .photo-frame img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 20%;
            transition: opacity 0.5s ease;
        }
        
        /* Galeri Noktaları */
        .gallery-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
            margin-bottom: 15px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: rgba(255, 51, 133, 0.3);
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .dot.active {
            background-color: #ff3385;
            box-shadow: 0 0 8px #ff3385;
            transform: scale(1.2);
        }

        /* CANLI AŞK SAYAÇ ALANI */
        .love-counter {
            background: rgba(255, 51, 133, 0.1); border: 1px solid rgba(255, 51, 133, 0.3); border-radius: 10px; padding: 8px; font-family: monospace; font-size: 12px; color: #ff3385; text-shadow: 0 0 5px rgba(255, 51, 133, 0.5); margin-bottom: 12px; font-weight: bold; line-height: 1.4;
        }

        /* Canlı Akışlı Yazı Kutusu */
        .message-box {
            font-size: 13px; line-height: 1.5; color: #e5daf0; background: rgba(0, 0, 0, 0.6); padding: 12px; border-radius: 12px; border-left: 3px solid #ff3385; text-align: left; height: 130px; overflow-y: auto; font-family: monospace; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); margin-bottom: 12px;
        }
        .message-box::-webkit-scrollbar { width: 4px; }
        .message-box::-webkit-scrollbar-thumb { background: #ff3385; border-radius: 10px; }

        /* Rezervasyon Durumu */
        .status-box {
            font-family: monospace; font-size: 11px; color: #ae20dd; text-shadow: 0 0 8px #ae20dd; font-weight: bold; letter-spacing: 1px; border-top: 1px dashed rgba(174, 32, 221, 0.4); padding-top: 10px;
        }

        /* Dokunmatik Kalp Efekti */
        .click-heart {
            position: absolute; pointer-events: none; color: #ff3385; animation: floatHeart 0.8s ease-out forwards; font-size: 24px; z-index: 9999; text-shadow: 0 0 8px #ff3385;
        }
        @keyframes floatHeart {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body onclick="spawnHeart(event)">

    <canvas id="matrix-bg"></canvas>
    <canvas id="fw-canvas"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button id="start-btn" onclick="startSurprise()">Sürprizi Başlat ❤️</button>

        <div id="countdown" style="display: none;">3</div>

        <div id="envelope-area" onclick="showPasswordPanel()">
            <div class="envelope-icon">✉️</div>
            <div class="envelope-hint">Sistemde Yeni Bir Mesaj Var 💌<br><span style="font-size:12px; color:#ff3385;">(Açmak İçin Dokun)</span></div>
        </div>

        <div id="password-panel">
            <div class="panel-title">🛡️ GÜVENLİK KONTROLÜ // SECURITY CHECK</div>
            <div class="panel-hint">
                IPUCU: SISTEM GIRIS KODU, BU EBEDI BAGLANTININ TEMELLERININ ATILDIGI EN OZEL TARIHTIR (GgAayY).
            </div>
            <input type="password" id="password-input" class="pass-input" placeholder="******" maxlength="6" pattern="\d*">
            <br>
            <button class="pass-btn" onclick="checkPassword()">SİSTEME GİRİŞ YAP</button>
            <div id="error-msg"></div>
        </div>

        <div id="birthday-card" class="card">
            <h1>EBEDİ BAĞLANTI KURULDU</h1>
            
            <div class="photo-frame" onclick="sonrakiResim(event)">
                <img id="galeri-resim" src="fotograf1.jpg" alt="Sevgilim">
            </div>
            
            <div class="gallery-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="love-counter" id="live-counter">Bağlantı Süresi Hesaplanıyor...</div>

            <div class="message-box" id="typewriter-text"></div>

            <div class="status-box">
                DURUM: SONSUZA KADAR REZERVE EDİLDİ ♾️
            </div>
        </div>
    </div>

    <script>
        const sevgiliOlunanTarih = new Date(2026, 3, 7, 0, 0, 0); // 7 Nisan 2026
        const loveLetter = "İyi ki doğdun aşkımsu... ❤️ Yanımda olduğun her an, bu uçsuz bucaksız evrendeki en gerçek ve en güzel duygu benim için. Hayatıma kattığın tüm güzellikler, yüzüme kondurduğun her tebessüm ve sevgin için teşekkür ederim. Varlığınla dünyamı güzelleştiren insan, iyi ki doğdun ve iyi ki varsın sevgilim. Yeni yaşın bize hep musmutlu, omuz omuza geçecek harika anlar getirsin! Seni çok seviyorum...";

        const resimler = ["fotograf1.jpg", "fotograf2.jpg", "fotograf3.jpg"];
        let aktifResimIndex = 0;
        let matrixInterval;

        const music = document.getElementById('bg-music');
        const countdownEl = document.getElementById('countdown');
        const envelopeArea = document.getElementById('envelope-area');
        const passPanel = document.getElementById('password-panel');
        const cardEl = document.getElementById('birthday-card');

        function startSurprise() {
            document.getElementById('start-btn').style.display = 'none';
            countdownEl.style.display = 'block';
            
            if (music) {
                music.play().catch(e => console.log("Müzik tetiklendi."));
            }
            
            let count = 3;
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    envelopeArea.style.display = 'block';
                }
            }, 1000);
        }

        function showPasswordPanel() {
            envelopeArea.style.display = 'none';
            passPanel.style.display = 'block';
            setTimeout(() => { document.getElementById("password-input").focus(); }, 120);
        }

        function checkPassword() {
            const input = document.getElementById("password-input").value;
            const error = document.getElementById("error-msg");
            
            if (input === "070426") {
                error.style.color = "#00ffcc";
                error.innerText = "ACCESS GRANTED // ERİŞİM ONAYLANDI...";
                
                if (music) music.play().catch(e => console.log("Müzik çalıyor."));

                setTimeout(() => {
                    passPanel.style.display = 'none';
                    cardEl.classList.add('active');
                    typeWriter(loveLetter, 0); 
                    updateLoveCounter();
                    setInterval(updateLoveCounter, 1000);
                }, 1000);
            } else {
                error.style.color = "#ff3333";
                error.innerText = "ACCESS DENIED // HATALI KOD!";
                document.getElementById("password-input").value = "";
                
                passPanel.style.animation = "none";
                setTimeout(() => { passPanel.style.animation = "pulse 0.3s 2"; }, 10);
            }
        }

        function sonrakiResim(event) {
            event.stopPropagation(); 
            const imgEl = document.getElementById("galeri-resim");
            const dots = document.querySelectorAll(".dot");
            
            aktifResimIndex = (aktifResimIndex + 1) % resimler.length;
            imgEl.style.opacity = 0;
            
            setTimeout(() => {
                imgEl.src = resimler[aktifResimIndex];
                imgEl.style.opacity = 1;
                
                dots.forEach((dot, index) => {
                    if(index === aktifResimIndex) {
                        dot.classList.add("active");
                    } else {
                        dot.classList.remove("active");
                    }
                });
            }, 200);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                const box = document.getElementById("typewriter-text");
                box.innerHTML += text.charAt(i);
                box.scrollTop = box.scrollHeight;
                setTimeout(() => typeWriter(text, i + 1), 45); 
            } else {
                clearInterval(matrixInterval);
                document.getElementById("fw-canvas").style.display = "block";
                startFireworks();
            }
        }

        function updateLoveCounter() {
            const simdi = new Date();
            const fark = simdi - sevgiliOlunanTarih;

            if (isNaN(fark)) {
                document.getElementById("live-counter").innerHTML = "💝 Birlikteliğimiz Ömür Boyu...";
                return;
            }

            const saniye = Math.floor((fark / 1000) % 60);
            const dakika = Math.floor((fark / 1000 / 60) % 60);
            const saat = Math.floor((fark / (1000 * 60 * 60)) % 24);
            const guntoplam = Math.floor(fark / (1000 * 60 * 60 * 24));
            
            const yil = Math.floor(guntoplam / 365);
            const kalanGun = guntoplam % 365;

            document.getElementById("live-counter").innerHTML = 
                `💝 Birlikteliğimiz: ${yil} Yıl, ${kalanGun} Gün, ${saat} Saat, ${dakika} Dakika, ${saniye} Saniye`;
        }

        function spawnHeart(e) {
            const heart = document.createElement("div");
            heart.className = "click-heart";
            heart.innerHTML = "❤️";
            heart.style.left = e.clientX + "px";
            heart.style.top = e.clientY + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        // MATRIX YAĞMURU MOTORU
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = '0123456789❤️❤️🎉✨'.split('');
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(13, 2, 19, 0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff3385'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        matrixInterval = setInterval(draw, 33);

        // SİBER HAVAİ FİŞEK MOTORU
        const fwCanvas = document.getElementById('fw-canvas');
        const fwCtx = fwCanvas.getContext('2d');
        let particles = [];

        function startFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            animateFireworks();
            setInterval(() => {
                createFirework(Math.random() * fwCanvas.width, Math.random() * (fwCanvas.height * 0.6));
            }, 600);
        }

        function createFirework(x, y) {
            const colors = ['#ff3385', '#ae20dd', '#00ffcc', '#ff0055', '#9d4edd'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    alpha: 1,
                    color: color,
                    size: Math.random() * 2 + 1
                });
            }
        }

        function animateFireworks() {
            requestAnimationFrame(animateFireworks);
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04; 
                p.alpha -= 0.015;
                
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                fwCtx.save();
                fwCtx.globalAlpha = p.alpha;
                fwCtx.fillStyle = p.color;
                fwCtx.shadowBlur = 10;
                fwCtx.shadowColor = p.color;
                fwCtx.beginPath();
                fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                fwCtx.fill();
                fwCtx.restore();
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(fwCanvas.style.display === "block") {
                fwCanvas.width = window.innerWidth;
                fwCanvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
