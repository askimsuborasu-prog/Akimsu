<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Sevgilim! ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0213;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle, #250b3a 0%, #0d0213 100%);
        }
        #matrix-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15;
        }
        .container {
            position: relative; z-index: 10; text-align: center; padding: 20px; width: 100%; max-width: 500px;
        }
        /* Geri Sayım */
        #countdown {
            font-size: 100px; font-weight: bold; color: #ff3385; text-shadow: 0 0 20px #ff3385; animation: pulse 1s infinite;
        }
        /* Müzik Başlatma Ekranı */
        #start-btn {
            background: #ff3385; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #ff3385; transition: all 0.3s;
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px #ff3385; }

        /* İnteraktif Zarf Yapısı */
        #envelope-wrapper { display: none; margin-top: 20px; perspective: 1000px; }
        .envelope {
            position: relative; width: 280px; height: 180px; background: #ff4d94; margin: 0 auto; border-radius: 0 0 10px 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.5s;
        }
        .envelope:hover { transform: translateY(-5px); }
        .envelope::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 100px solid #ff1a75; transform-origin: top; transition: transform 0.5s; z-index: 3;
        }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .envelope-text { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-weight: bold; font-size: 14px; z-index: 4; }

        /* Ana İçerik Kartı */
        .card {
            display: none; background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 25px; box-shadow: 0 8px 32px 0 rgba(255, 51, 133, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transform: scale(0.8); opacity: 0; transition: all 1s ease-in-out;
        }
        .card.active { display: block; transform: scale(1); opacity: 1; }
        h1 { font-size: 32px; color: #ff3385; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255, 51, 133, 0.5); }

        /* Fotoğraf Galerisi (Slider) */
        .slider {
            position: relative; width: 100%; height: 300px; border-radius: 15px; overflow: hidden; border: 3px solid #ff3385; box-shadow: 0 0 15px #ff3385; margin-bottom: 15px;
        }
        .slides { display: flex; width: 300%; height: 100%; transition: transform 0.5s ease-in-out; }
        .slides img { width: 33.333%; height: 100%; object-fit: cover; }

        /* Aşk Sayacı */
        .counter-box {
            background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ff3385;
        }
        .counter-box h3 { font-size: 14px; color: #ff99c2; margin-bottom: 5px; text-transform: uppercase; }
        #timer { font-size: 16px; font-weight: bold; color: #fff; letter-spacing: 0.5px; }

        .message-box {
            font-size: 16px; line-height: 1.5; color: #e0e0e0; background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 10px; border-left: 4px solid #ff3385; text-align: left;
        }

        /* Uçan Balonlar */
        .balloon {
            position: absolute; bottom: -100px; width: 40px; height: 50px; border-radius: 50%; background: rgba(255, 51, 133, 0.8); animation: floatUp 6s linear infinite; z-index: 2;
        }
        .balloon::before {
            content: ""; position: absolute; bottom: -8px; left: 18px; width: 4px; height: 10px; background: #fff; opacity: 0.7;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div id="balloon-container"></div>

    <audio id="bg-music" loop>
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button id="start-btn" onclick="startSurprise()">Sürprizi Başlat ❤️</button>

        <div id="countdown" style="display: none;">3</div>

        <div id="envelope-wrapper">
            <div class="envelope" onclick="openEnvelope(this)">
                <div class="envelope-text">Sana Bir Mektubum Var 💌<br>(Tıkla ve Aç)</div>
            </div>
        </div>

        <div id="birthday-card" class="card">
            <h1>İYİ Kİ DOĞDUN! 🎉</h1>
            
            <div class="slider">
                <div class="slides" id="slides">
                    <img src="fotograf1.jpg" alt="Anı 1">
                    <img src="fotograf2.jpg" alt="Anı 2">
                    <img src="fotograf3.jpg" alt="Anı 3">
                </div>
            </div>

            <div class="counter-box">
                <h3>Ömrüme Hoş Geldin</h3>
                <div id="timer">Yükleniyor...</div>
            </div>

            <div class="message-box">
                <p>Yanımda olduğun her an, hayatıma kattığın tüm güzellikler için teşekkür ederim. İyi ki doğdun, iyi ki benim oldun. Yeni yaşın bize hep musmutlu anlar getirsin sevgilim! Seni çok seviyorum. ❤️</p>
            </div>
        </div>
    </div>

    <script>
        // İlişki başlangıç tarihi: 07 Nisan 2026 (Nisan ayı endeksi = 3)
        const startDate = new Date(2026, 3, 7, 0, 0, 0);

        const music = document.getElementById('bg-music');
        const countdownEl = document.getElementById('countdown');
        const envelopeWrapper = document.getElementById('envelope-wrapper');
        const cardEl = document.getElementById('birthday-card');

        function startSurprise() {
            document.getElementById('start-btn').style.display = 'none';
            countdownEl.style.display = 'block';
            music.play().catch(e => console.log("Müzik engellendi, manuel oynatılıyor."));
            
            let count = 3;
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else if (count === 0) {
                    countdownEl.innerText = "KUTLA! 🌟";
                    createBalloons();
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    envelopeWrapper.style.display = 'block';
                }
            }, 1000);
        }

        function openEnvelope(envelope) {
            envelope.classList.add('open');
            setTimeout(() => {
                envelopeWrapper.style.display = 'none';
                cardEl.classList.add('active');
                startSlider();
                setInterval(updateCounter, 1000);
            }, 1200);
        }

        let slideIndex = 0;
        function startSlider() {
            const slides = document.getElementById('slides');
            // Eğer ekstra fotoğraf yüklemediyseniz sadece 1. fotoğrafın kalması için döngü kontrolü
            setInterval(() => {
                slideIndex = (slideIndex + 1) % 3;
                slides.style.transform = `translateX(-${slideIndex * 33.333}%)`;
            }, 3000);
        }

        function updateCounter() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerText = `${days} Gün, ${hours} Saat, ${minutes} Dakika, ${seconds} Saniye`;
        }

        function createBalloons() {
            const container = document.getElementById('balloon-container');
            const colors = ['#ff3385', '#ff99c2', '#ff4d94', '#ffb3d1', '#e6005c'];
            for (let i = 0; i < 30; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDelay = Math.random() * 4 + 's';
                balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(balloon);
            }
        }

        // Matrix Arka Plan Efekti
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = '0123456789❤️❤️🎉🌟✨'.split('');
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(13, 2, 19, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff3385'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 30);
    </script>
</body>
</html>
