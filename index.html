       <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebedi Bağlantı Kuruldu ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0213;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle, #250b3a 0%, #0d0213 100%);
            position: relative;
        }
        /* Matrix Dijital Yağmur */
        #matrix-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15;
        }
        .container {
            position: relative; z-index: 10; text-align: center; padding: 20px; width: 100%; max-width: 500px;
        }
        
        /* Geri Sayım */
        #countdown {
            font-size: 100px; font-weight: bold; color: #ff3385; text-shadow: 0 0 20px #ff3385; animation: pulse 1s infinite;
        }
        /* Giriş Butonu */
        #start-btn {
            background: linear-gradient(45deg, #ff3385, #ae20dd); color: white; border: none; padding: 15px 35px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px rgba(255, 51, 133, 0.5); transition: all 0.3s;
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #ff3385; }

        /* Hacker Kart Yapısı */
        .card {
            display: none; background: rgba(15, 5, 25, 0.8); border-radius: 25px; padding: 25px; box-shadow: 0 0 30px rgba(255, 51, 133, 0.3); backdrop-filter: blur(12px); border: 1px solid rgba(255, 51, 133, 0.2); transform: scale(0.9); opacity: 0; transition: all 1s ease-in-out;
        }
        .card.active { display: block; transform: scale(1); opacity: 1; }
        h1 { font-size: 26px; color: #ff3385; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255, 51, 133, 0.6); letter-spacing: 2px; font-family: monospace; }

        /* Fotoğraf Alanı */
        .photo-frame {
            width: 100%; height: 300px; border-radius: 15px; overflow: hidden; border: 2px solid #ff3385; box-shadow: 0 0 15px rgba(255, 51, 133, 0.4); margin-bottom: 20px;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* Klavye Efektli Mektup Alanı */
        .message-box {
            font-size: 15px; line-height: 1.6; color: #e5daf0; background: rgba(0, 0, 0, 0.6); padding: 18px; border-radius: 12px; border-left: 3px solid #ff3385; text-align: left; min-height: 100px; font-family: monospace; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Dokunmatik Kalp Efekti */
        .click-heart {
            position: absolute; pointer-events: none; color: #ff3385; animation: floatHeart 0.8s ease-out forwards; font-size: 24px; z-index: 9999; text-shadow: 0 0 8px #ff3385;
        }
        @keyframes floatHeart {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body onclick="spawnHeart(event)">

    <canvas id="matrix-bg"></canvas>

    <audio id="bg-music" loop>
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button id="start-btn" onclick="startSurprise()">Sürprizi Başlat ❤️</button>

        <div id="countdown" style="display: none;">3</div>

        <div id="birthday-card" class="card">
            <h1>EBEDİ BAĞLANTI KURULDU</h1>
            
            <div class="photo-frame">
                <img src="fotograf1.jpg" alt="Sevgilim">
            </div>

            <div class="message-box" id="typewriter-text"></div>
        </div>
    </div>

    <script>
        // Mektup İçeriği
        const loveLetter = "İyiki doğdun aşkımsu... ❤️ Yanımda olduğun her an, bu dijital dünyadaki en gerçek ve en güzel duygu benim için. Hayatıma kattığın tüm renkler ve sevgin için teşekkür ederim. İyi ki doğdun, iyi ki benim dünyama sızdın sevgilim. Yeni yaşın bize hep musmutlu anlar getirsin! Seni çok seviyorum...";

        const music = document.getElementById('bg-music');
        const countdownEl = document.getElementById('countdown');
        const cardEl = document.getElementById('birthday-card');

        // Geri Sayımı Başlayan Fonksiyon
        function startSurprise() {
            document.getElementById('start-btn').style.display = 'none';
            countdownEl.style.display = 'block';
            music.play().catch(e => console.log("Müzik çalındı."));
            
            let count = 3;
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.remove(); // Geri sayım bittiği an elementi yok et
                    
                    // Hiçbir ara yazı olmadan doğrudan ana içeriği ve mektubu getir
                    cardEl.classList.add('active');
                    typeWriter(loveLetter, 0); 
                }
            }, 1000);
        }

        // Hacker Tarzı Harf Harf Yazma Efekti
        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("typewriter-text").innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 45); 
            }
        }

        // Ekrana Dokununca Çıkan Kalp Efekti
        function spawnHeart(e) {
            const heart = document.createElement("div");
            heart.className = "click-heart";
            heart.innerHTML = "❤️";
            heart.style.left = e.clientX + "px";
            heart.style.top = e.clientY + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        // Matrix Yağmuru Kodları
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = '0123456789❤️❤️🎉✨'.split('');
        const fontSize = 16; const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(13, 2, 19, 0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff3385'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
