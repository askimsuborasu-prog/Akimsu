<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun! ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0213;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle, #250b3a 0%, #0d0213 100%);
        }
        /* Matrix Dijital Yağmur Arka Planı Efekti */
        #matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }
        /* Geri Sayım Stili */
        #countdown {
            font-size: 120px;
            font-weight: bold;
            color: #ff3385;
            text-shadow: 0 0 20px #ff3385, 0 0 40px #ff3385;
            animation: pulse 1s infinite;
        }
        /* Kart Yapısı */
        .card {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(255, 51, 133, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.8);
            opacity: 0;
            transition: all 1s ease-in-out;
        }
        .card.active {
            display: block;
            transform: scale(1);
            opacity: 1;
        }
        h1 {
            font-size: 36px;
            color: #ff3385;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 51, 133, 0.5);
        }
        /* Gönderdiğiniz Fotoğrafın Alanı */
        .photo-frame {
            width: 100%;
            max-height: 350px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ff3385;
            box-shadow: 0 0 15px #ff3385;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .message-box {
            font-size: 18px;
            line-height: 1.6;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff3385;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="container">
        <div id="countdown">3</div>

        <div id="birthday-card" class="card">
            <h1>İYİ Kİ DOĞDUN! 🎉</h1>
            
            <div class="photo-frame">
                <img src="fotograf.jpg" alt="Mutlu Anlar">
            </div>

            <div class="message-box">
                <p>Yanımda olduğun her an için, hayatıma kattığın tüm güzellikler için teşekkür ederim. Yeni yaşın sana senin gibi musmutlu anlar getirsin. İyi ki varsın! ❤️</p>
            </div>
        </div>
    </div>

    <script>
        // Geri Sayım Sistemi
        const countdownElement = document.getElementById('countdown');
        const cardElement = document.getElementById('birthday-card');
        let count = 3;

        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                countdownElement.innerText = count;
            } else if (count === 0) {
                countdownElement.innerText = "KUTLA! 🌟";
            } else {
                clearInterval(timer);
                countdownElement.style.display = 'none'; // Geri sayımı gizle
                cardElement.classList.add('active'); // Kartı göster
            }
        }, 1000);

        // Arka Plandaki Dijital Efekt (Matrix Rain türevi basit kod)
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = '0123456789❤️❤️🎉🌟✨';
        const alphabet = katakana.split('');

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(13, 2, 19, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff3385';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
